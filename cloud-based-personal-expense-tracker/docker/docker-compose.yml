version: '3.8'

services:
  # Relational Database Node
  db:
    image: mysql:8.0
    container_name: finops-mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: personal_expenses
      MYSQL_ROOT_PASSWORD: supersecretpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # Full-Stack Express Backend API Server
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: finops-express-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=supersecretpassword
      - JWT_SECRET=aws-devops-secret-key-987654321
    depends_on:
      - db

  # Static Nginx Web Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: finops-nginx-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
